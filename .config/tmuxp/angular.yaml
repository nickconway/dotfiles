session_name: "${TMUXP_SESSION_NAME}"
start_directory: "${TMUXP_START_DIR}"
windows:
  - layout: main-horizontal
    options:
      main-pane-height: "80%"
    panes:
      - shell_command:
          - nvim
        focus: true
      - shell_command:
          - nvm use 16.15.1
          - ng serve --open
