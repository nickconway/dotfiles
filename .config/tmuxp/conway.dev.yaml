session_name: conway_dev
windows:
  - window_name: Editor
    layout: tiled
    shell_command_before:
      - cd ~/conway.dev
    panes:
      - shell_command:
          - nvim
  - window_name: Server
    layout: tiled
    shell_command_before:
      - cd ~/conway.dev
    panes:
      - shell_command:
          - npm run dev -- --open
