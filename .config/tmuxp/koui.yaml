session_name: koui-dev
start_directory: "$KOTEST"
windows:
  - layout: main-horizontal
    options:
      main-pane-height: "80%"
    panes:
      - shell_command:
          - cd ~/git/koui3
          - nvim
        focus: true
      - shell_command:
          - cd ~/git/koui3
          - nvm use 16.15.1
          - ng serve --open
      -
  - layout: main-horizontal
    options:
      main-pane-height: "50%"
    panes:
      - shell_command:
          - $CRYPTSOFT/kmipc_server/bin/kmip_server
      - shell_command:
          - NODE_ENV=development
          - sleep 3
          - node $KODIR/ko_rest/server-ui.js
