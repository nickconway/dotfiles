session_name: space
windows:
  - window_name: Editor
    layout: tiled
    shell_command_before:
      - cd ~/space
    panes:
      - shell_command:
          - nvim
  - window_name: Server
    layout: tiled
    shell_command_before:
      - cd ~/space
    panes:
      - shell_command:
          - npm run dev -- --open
