# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# Status bar
set-option -g status-left "#{tmux_mode_indicator}"
set-option -g status-right "#{tmux_mode_indicator}"
set -g status-interval 2
set -g status-justify centre
set -g status-position top
set -g status-left-length 40
set -g status-right-length 40

# split panes using h and v
unbind '"'
unbind %
bind v split-window -h
bind h split-window -v

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# increase scroll-back history
set -g history-limit 5000

# use vim key bindings
setw -g mode-keys vi

# decrease command delay (increases vim responsiveness)
set -sg escape-time 1

# increase repeat time for repeatable commands
set -g repeat-time 1000

# start window index at 1 instead of 0
set -g base-index 1

# start pane index at 1 instead of 0
setw -g pane-base-index 1

# highlight window when it has new activity
setw -g monitor-activity on
set -g visual-activity on

# re-number windows when one is closed
set -g renumber-windows on

###########################
# Colors
###########################

# use 256 xterm for pretty colors. This enables same colors from iTerm2 within tmux.
# This is recommended in neovim :healthcheck
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# color status bar
set -g status-style fg=white,bg=default
# color of message bar
set -g message-style fg=white,bg=default

# highlight current window
setw -g window-status-style fg=white,bg=default
setw -g window-status-current-style fg=colour235,bg=white
setw -g window-status-format ' #W '
setw -g window-status-current-format ' #W '

# set color of active pane
set -g pane-border-style fg=colour236
set -g pane-active-border-style fg=white

###########################
# Plugins
###########################
# To install plugins:
#   1) Add plugin down here
#   2) Prefix + I to install plugin
# To update plugins:
#   1) Prefix + U
# To remove plugins:
#   1) Remove line down here
#   2) Prefix + ALT + U
# If you're using iTerm2 on a Mac you may need to go to your Profiles,
# then keys and select that the `option` key should be treated as `Esc+`
# in order for the `Prefix + ALT + U` combination to work.

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

set -g @continuum-boot 'on'
set -g @continuum-restore 'on'

set -g @mode_indicator_prefix_mode_style 'bg=default,fg=cyan'
set -g @mode_indicator_copy_mode_style 'bg=default,fg=red'
set -g @mode_indicator_sync_mode_style 'bg=default,fg=yellow'
set -g @mode_indicator_empty_mode_style 'bg=default,fg=blue'

# Run Tmux Plugin Manager
run '~/.tmux/plugins/tpm/tpm'
